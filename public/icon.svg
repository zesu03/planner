<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Aakhirah Planner icon">
  <!-- Dark olive square with rounded corners — matches the dark theme's bg-card -->
  <rect width="64" height="64" rx="14" fill="#121412"/>
  <!-- Gold crescent — two overlapping circles, subtract the smaller. Slight
       counter-clockwise rotation so the opening points up-and-right, which
       reads more decorative than astronomically literal. -->
  <path d="M 40 14
           A 18 18 0 1 0 40 50
           A 14 14 0 1 1 40 14 Z"
        fill="#c9a84c"/>
</svg>
